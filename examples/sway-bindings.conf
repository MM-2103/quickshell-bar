# Sway keybinds for quickshell-bar.
# Drop into ~/.config/sway/config (or source from a separate include).
# Replace /path/to/quickshell-bar with the actual path to your clone.
#
# Sway auto-reloads on `swaymsg reload`.

# Autostart on session login.
exec qs -p /path/to/quickshell-bar -d

# Bindings — $mod is whatever you've already defined for Sway's modifier
# (typically `set $mod Mod4`, the Super / Windows key).
bindsym $mod+p           exec qs -p /path/to/quickshell-bar ipc call launcher  open
bindsym $mod+semicolon   exec qs -p /path/to/quickshell-bar ipc call launcher  openEmoji
bindsym $mod+v           exec qs -p /path/to/quickshell-bar ipc call clipboard open
bindsym $mod+Shift+x     exec qs -p /path/to/quickshell-bar ipc call lock      open
