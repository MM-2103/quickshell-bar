# Hypridle config for quickshell-bar's session lock.
# Drop into ~/.config/hypr/hypridle.conf and restart hypridle:
#
#   pkill hypridle
#   setsid hypridle </dev/null >/dev/null 2>&1 &
#
# Replace /path/to/quickshell-bar with your clone path. The DPMS
# `niri msg action power-off-monitors` line is niri-specific; swap to:
#   - Hyprland:  hyprctl dispatch dpms off / on
#   - Sway:      swaymsg "output * dpms off" / "on"

general {
    lock_cmd         = qs -p /path/to/quickshell-bar ipc call lock open
    before_sleep_cmd = qs -p /path/to/quickshell-bar ipc call lock open
    after_sleep_cmd  = niri msg action power-on-monitors
}

listener {
    timeout    = 300                                  # 5 min — lock
    on-timeout = qs -p /path/to/quickshell-bar ipc call lock open
}

listener {
    timeout    = 330                                  # 5.5 min — DPMS off
    on-timeout = niri msg action power-off-monitors
    on-resume  = niri msg action power-on-monitors
}
