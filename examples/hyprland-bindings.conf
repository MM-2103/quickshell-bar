# Hyprland keybinds for quickshell-bar.
# Drop into ~/.config/hypr/hyprland.conf (or source from a separate file).
# Replace /path/to/quickshell-bar with the actual path to your clone.
#
# Hyprland auto-reloads on save; no daemon restart needed.

# Autostart on session login.
exec-once = qs -p /path/to/quickshell-bar -d

# Bindings — Mod here is "SUPER" (the Windows / Cmd key).
bind = SUPER,       P,         exec, qs -p /path/to/quickshell-bar ipc call launcher  open
bind = SUPER,       semicolon, exec, qs -p /path/to/quickshell-bar ipc call launcher  openEmoji
bind = SUPER,       V,         exec, qs -p /path/to/quickshell-bar ipc call clipboard open
bind = SUPER SHIFT, X,         exec, qs -p /path/to/quickshell-bar ipc call lock      open
